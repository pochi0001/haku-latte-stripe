  <script>

  // checkout側でも在庫を確認するために保持
  let productsMap = new Map(); // id -> product

  // ✅ サーバーから最新在庫を取得
  async function fetchProducts() {
    const res = await fetch("/products", { cache: "no-store" });
    const products = await res.json();
    productsMap = new Map(products.map(p => [Number(p.id), p]));
    return productsMap;
  }

  function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
  }

  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function calcTotal(cart) {
    return cart.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.qty || 1), 0);
  }

  // ✅ カート内アイテムを「最新在庫」で検証（決済前に弾く）
  function validateCartStock(cart) {
    const errors = [];
    for (const item of cart) {
      const p = productsMap.get(Number(item.id));
      if (!p) {
        errors.push(`商品が見つかりません: ${item.name || `id=${item.id}`}`);
        continue;
      }
      if (Number(p.stock) <= 0) {
        errors.push(`在庫切れです: ${p.name}`);
        continue;
      }
      // 1人1点（qty=1）想定ならこれで十分
      const qty = Number(item.qty || 1);
      if (qty > Number(p.stock)) {
        errors.push(`在庫が不足しています: ${p.name}（在庫:${p.stock}）`);
      }
    }
    return errors;
  }

  // カート表示（最新在庫があれば表示に反映）
  function loadCart() {
    const cart = getCart();
    const list = document.getElementById("cart-list");
    let total = 0;

    if (!cart || cart.length === 0) {
  list.innerHTML = "<p>カートは空です。</p>";
  document.getElementById("total-price").textContent = "¥0";
  return;
}

    list.innerHTML = "";

    cart.forEach((item, index) => {
  const qty = Number(item.qty || 1);
  total += Number(item.price || 0) * qty;

  const p = productsMap.get(Number(item.id));
  const soldOut = p ? Number(p.stock) <= 0 : false;

  list.innerHTML += `
    <div class="cart-item ${soldOut ? "sold-out" : ""}">
      <img src="/img/${item.id}.jpg" class="cart-img" alt="${item.name || ""}">

      <div class="cart-info">
        <h4>${item.name}</h4>
        <p class="price">¥${Number(item.price).toLocaleString()}</p>

        

        <div class="qty-control">
          <button class="qty-btn" type="button" onclick="changeQty(${index}, -1)" aria-label="減らす">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" type="button" onclick="changeQty(${index}, 1)" aria-label="増やす">＋</button>

          <button class="trash-btn" type="button" onclick="removeLine(${index})" aria-label="削除">×</button>
        </div>
      </div>
    </div>
  `;
});

    document.getElementById("total-price").textContent = "¥" + total.toLocaleString();
    updatePayButtonsState();
  }

  // カートから削除
  window.changeQty = function(index, diff) {
    const cart = getCart();
    if (!cart[index]) return;

    const current = Number(cart[index].qty || 1);
    let next = current + diff;

    // 0以下なら行ごと削除（−を押し続けたら消える）
    if (next <= 0) {
      cart.splice(index, 1);
      saveCart(cart);
      loadCart();
      return;
    }

    // ✅ 在庫上限（productsMapがある時だけチェック）
    const id = Number(cart[index].id);
    const p = productsMap.get(id);
    if (p) {
      const max = Number(p.stock || 0);

      // 在庫0のときは増やせない（自然な挙動）
      if (max <= 0) {
        alert("在庫切れです");
        return;
      }

      // 在庫を超えたら止める
      if (next > max) {
        next = max;
        alert(`在庫は最大 ${max} 個です`);
      }
    }

    cart[index].qty = next;
    saveCart(cart);
    loadCart();
  };

  window.removeLine = function(index) {
    const cart = getCart();
    if (!cart[index]) return;
    cart.splice(index, 1);
    saveCart(cart);
    loadCart();
  };

  function isCustomerInfoComplete() {
    const name = document.getElementById("customer-name")?.value.trim();
    const address = document.getElementById("customer-address")?.value.trim();
    const email = document.getElementById("customer-email")?.value.trim();
    const phone = document.getElementById("customer-phone")?.value.trim();

    return Boolean(name && address && email && phone);
  }

  function updatePayButtonsState() {
    const stripeBtn = document.getElementById("stripe-pay");
    const paypayBtn = document.getElementById("paypay-pay");
    const guide = document.getElementById("checkout-guide");

    const cart = getCart();
    const hasCart = Array.isArray(cart) && cart.length > 0;
    const customerOk = isCustomerInfoComplete();
    const stockOk = validateCartStock(cart).length === 0;

    const ok = hasCart && customerOk && stockOk;

    if (stripeBtn) stripeBtn.disabled = !ok;
    if (paypayBtn) paypayBtn.disabled = !ok;

    if (guide) {
      if (!hasCart) {
        guide.textContent = "カートに商品が入っていません。";
      } else if (!stockOk) {
        guide.textContent = "在庫切れの商品があります。カートを確認してください。";
      } else if (!customerOk) {
        guide.textContent = "お届け先情報をすべて入力すると、決済ボタンを押せるようになります。";
      } else {
        guide.textContent = "入力完了です。お支払い方法を選択してください。";
      }
    }
  }





async function onPayPayClick() {
  try {
    const cart = getCart();

    if (!cart || cart.length === 0) {
      alert("カートが空です。");
      return;
    }

    const name = document.getElementById("customer-name").value.trim();
    const address = document.getElementById("customer-address").value.trim();
    const email = document.getElementById("customer-email").value.trim();
    const phone = document.getElementById("customer-phone").value.trim();

    if (!name || !address || !email || !phone) {
      alert("お届け先情報をすべて入力してください。");
      return;
    }

    await fetchProducts();

    const stockErrors = validateCartStock(cart);

    if (stockErrors.length > 0) {
      alert(stockErrors.join("\n"));
      loadCart();
      return;
    }

    const res = await fetch("/paypay/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        cart,
        name,
        address,
        email,
        phone,
      }),
    });

    const data = await res.json();

    console.log("PayPay create:", data);

    if (!res.ok || !data.success) {
      alert(data.error || "PayPay決済開始に失敗しました");
      return;
    }

    localStorage.setItem(
      "lastOrder",
      JSON.stringify({
        createdAt: Date.now(),
        items: data.itemsDetailed,
        total: data.total,
      })
    );

    window.location.href = data.url;

  } catch (err) {
    console.error(err);
    alert("PayPayエラー");
  }
}






async function onStripeClick() {
  try {
    const cart = getCart();

    if (!cart || cart.length === 0) {
      alert("カートが空です");
      return;
    }

    const name = document.getElementById("customer-name").value.trim();
    const address = document.getElementById("customer-address").value.trim();
    const email = document.getElementById("customer-email").value.trim();
    const phone = document.getElementById("customer-phone").value.trim();

    if (!name || !address || !email || !phone) {
      alert("お届け先情報をすべて入力してください。");
      return;
    }

    await fetchProducts();

    const stockErrors = validateCartStock(cart);

    if (stockErrors.length > 0) {
      alert(stockErrors.join("\n"));
      loadCart();
      return;
    }

    const res = await fetch("/stripe/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        cart,
        name,
        address,
        email,
        phone,
      }),
    });

    const data = await res.json();

    console.log("Stripe create:", data);

    if (!res.ok || !data.success) {
      alert(data.error || "Stripe決済開始に失敗しました");
      return;
    }

    localStorage.setItem(
      "lastOrder",
      JSON.stringify({
        createdAt: Date.now(),
        items: data.itemsDetailed,
        total: data.total,
        method: "Stripe",
      })
    );

    window.location.href = data.url;

  } catch (err) {
    console.error(err);
    alert("Stripeエラー");
  }
}









  // 初期化
  document.addEventListener("DOMContentLoaded", async () => {

    // ① 入力欄に文字を入れるたびにボタン状態を更新
    ["customer-name", "customer-address", "customer-email", "customer-phone"].forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener("input", updatePayButtonsState);
      }
    });

    // ② まず在庫を取得
    await fetchProducts();

    // ③ カート表示
    loadCart();

    // ★追加
    const stripeBtn = document.getElementById("stripe-pay");
    if (stripeBtn) {
      stripeBtn.addEventListener("click", onStripeClick);
    }

    // ⑥ PayPayボタンにイベント追加
    const paypayBtn = document.getElementById("paypay-pay");
    if (paypayBtn) {
      paypayBtn.addEventListener("click", onPayPayClick);
    }

    // ⑦ 最後にボタン状態を確定
    updatePayButtonsState();
  });
  </script>
